---
#@ load("funcs.lib.yml", "slack_hook", "pr_hook")
#@ load("@ytt:data", "data")
#@ load("@ytt:template", "template")

#@ env = data.values.env

#!  JOBS

jobs:
  - name: set-pipeline
    plan:
      - get: src
        params:
          #@ if/end env != 'dev':
          depth: 1
          #@ if/end env == 'dev':
          integration_tool: checkout
        trigger: true
      - get: pipeline-tasks
      - get: general-task
      - task: boot
        image: general-task
        file: pipeline-tasks/tasks/boot.yml
        params:
          ENV_OVERRIDE: ((deploy-env))
      - set_pipeline: self
        file: compiled/set-pipeline.yml
        instance_vars:
          deploy-env: ((deploy-env))

  #! Temp until we deploy prod app
  #@ if/end env != 'production':
  - name: test-db
    plan:
      - get: src
        params:
          #@ if/end env != 'dev':
          depth: 1
          #@ if/end env == 'dev':
          integration_tool: checkout
        trigger: true
        passed: [set-pipeline]
      - in_parallel:
          - get: general-task
          - get: postgres
            params:
              format: oci
          - get: node22
          - get: node-oci
            resource: node22
            params:
              format: oci
          - get: pipeline-tasks
      #@ if/end env == 'dev':
      - #@ pr_hook("pending", "test-pages-editor")
      - task: install-deps
        file: src/ci/partials/install-deps.yml
        image: node22

      - task: test
        file: src/ci/partials/test.yml
        privileged: true
    on_failure:
      in_parallel:
        -  #@ slack_hook("failure", "test")
        #@ if/end env == 'dev':
        -  #@ pr_hook("failure", "test-pages-editor")
    on_success:
      in_parallel:
        -  #@ slack_hook("success", "test")
        #@ if/end env == 'dev':
        -  #@ pr_hook("success", "test-pages-editor")


  #! Temp until we deploy prod app
  #@ if/end env != 'production':
  - name: deploy-pages-editor
    plan:
      - get: src
        params:
          #@ if/end env != 'dev':
          depth: 1
          #@ if/end env == 'dev':
          integration_tool: checkout
        trigger: true
        #@ if/end env != 'dev':
        passed: [test-db]
        #@ if/end env == 'dev':
        passed: [set-pipeline]
      - get: general-task
      - get: node22
      - get: pipeline-tasks
      - task: install-deps
        file: src/ci/partials/install-deps.yml
        image: node22
      #@ if/end env == 'dev':
      -  #@ pr_hook("pending", "deploy-pages-editor")
      - task: get-app-env
        image: general-task
        file: pipeline-tasks/tasks/get-app-env.yml
        params:
          _: #@ template.replace(data.values.env_cf_editor)
          APP_ENV: ((deploy-env))
          CF_APP_NAME: pages-editor-((deploy-env))

      - task: check-migrations
        file: src/ci/partials/check-migrations.yml
        image: node22
        params:
          PAYLOAD_SECRET: citmpsecret

      - task: build
        file: src/ci/partials/build.yml
        image: node22
        params:
          APP_ENV: ((deploy-env))
          #@ if/end env == 'dev':
          PUBLIC_URL: https://pages-editor-((deploy-env)).app.cloud.gov
          #@ if/end env == 'staging':
          PUBLIC_URL: https://publisher-((deploy-env)).cloud.gov
          #@ if/end env == 'production':
          PUBLIC_URL: https://publisher.cloud.gov

      - task: deploy
        file: src/ci/partials/deploy.yml
        image: general-task
        params:
          _: #@ template.replace(data.values.env_cf_editor)
          CF_APP_NAME: pages-editor-((deploy-env))
          CF_MANIFEST: src/.cloudgov/manifest.yml
          CF_VARS_FILE: src/.cloudgov/vars/pages-((deploy-env)).yml
          CF_PATH: src
        on_failure:
          try:
            task: cancel-api-deployment
            file: pipeline-tasks/tasks/cancel-deployment.yml
            image: general-task
            params:
              _: #@ template.replace(data.values.env_cf_editor)
              CF_APP_NAME: pages-((deploy-env))
    on_failure:
      in_parallel:
        -  #@ slack_hook("failure", "deployment")
        #@ if/end env == 'dev':
        -  #@ pr_hook("failure", "deploy-pages-editor")
    on_success:
      in_parallel:
        -  #@ slack_hook("success", "deployment")
        #@ if/end env == 'dev':
        -  #@ pr_hook("success", "deploy-pages-editor")

  #! Temp until we deploy prod app
  #@ if/end env != 'production':
  - name: create-user-provided-service-pages-bucket-manager
    plan:
      - get: weekly-tuesdays-at-7am
        trigger: true
      - get: src
        params:
          #@ if/end env != 'dev':
          depth: 1
          #@ if/end env == 'dev':
          integration_tool: checkout
        passed: [set-pipeline]
      - get: general-task
      - get: pipeline-tasks

      - task: create-user-provided-service
        file: src/ci/partials/create-user-provided-service.yml
        image: general-task
        params:
          _: #@ template.replace(data.values.env_cf_editor)
          APP_ENV: ((deploy-env))
          SERVICE_NAME: pages-bucket-manager
          SERVICE_CREDENTIALS: ((pages_bucket_manager))
    on_failure:
      in_parallel:
        -  #@ slack_hook("failure", "create-user-provided-service-pages-bucket-manager")
    on_success:
      in_parallel:
        -  #@ slack_hook("success", "create-user-provided-service-pages-bucket-manager")

  #@ if/end env == 'staging':
  - name: update-release-branch
    plan:
      - get: src
        passed:
          - deploy-pages-editor
        trigger: true
      - get: general-task
      - get: pipeline-tasks
      - task: update-release-branch
        image: general-task
        file: pipeline-tasks/tasks/update-release-branch.yml

  #@ if/end env == 'production':
  - name: release
    plan:
      - get: src
        params: { depth: 1 }
        trigger: true
        passed: [set-pipeline]
      -  #@ template.replace(data.values.release_steps)
      - put: slack-cg-pages
        params:
          text_file: src/slackrelease.md
          channel: ((slack-channel))
          username: ((slack-username))
          icon_url: ((slack-icon-url))

#!  RESOURCES

resources:
  #@ if/end env == 'dev':
  - name: src
    type: pull-request
    check_every: 1m
    source:
      repository: ((pages-editor-repository-path))
      access_token: ((gh-access-token))
      base_branch: main
      disable_forks: true
      ignore_drafts: false

  #@ if/end env == 'staging':
  - name: src
    type: git
    icon: github
    source:
      uri: git@github.com:((pages-editor-repository-path))
      branch: main
      commit_verification_keys: ((cloud-gov-pages-gpg-keys))
      private_key: ((pages-gpg-operations-github-sshkey.private_key))

  #@ if env == 'production':
  - name: src
    type: git
    icon: github
    source:
      uri: ((git-base-url))/((pages-editor-repository-path))
      branch: main
      commit_verification_keys: ((cloud-gov-pages-gpg-keys))
      tag_filter: 0.*.*
      fetch_tags: true

  - name: pages-release
    type: github-release
    source:
      owner: cloud-gov
      repository: pages-editor
      access_token: ((gh-access-token))

  - name: slack-cg-pages
    type: slack-notification
    source:
      url: ((slack-webhook-url-cg-pages))
  #@ end

  #! Temp until we deploy prod app
  #@ if env != 'production':
  - name: weekly-tuesdays-at-7am
    type: time
    source:
      interval: 168h
      location: America/Los_Angeles
      start: 7:00 AM
      stop: 7:30 AM
      days: [Tuesday]
      initial_version: true


  - name: node22
  - name: postgres
  - name: slack
  #@ end

  - name: general-task
  - name: pipeline-tasks

#!  RESOURCE TYPES

resource_types:
  - name: git
  - name: slack-notification
  - name: registry-image
  - name: time
  #@ if/end env == 'dev':
  - name: pull-request
  #@ if/end env == 'production':
  - name: github-release
